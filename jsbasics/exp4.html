<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Exp4.CSS">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h2>Student Result Calculator</h2>
        <label for="subjects">Enter number of Subjects</label><br>
        <input type="number" id="subjects"><br><br>
        <button onclick="calculateResult()">Calculate Result</button>
        <div id="result"></div>
    </div>


    <script >
    function calculateResult() {
    let n = document.getElementById("subjects").value;
    let total = 0;

    for (let i = 1; i <= n; i++) {
        let marks = parseFloat(prompt("Enter the marks for subject " + i));
        total = total + marks;
    }

    let avg = total / n;
    let grade;
    let result;

    if (avg >= 90) {
        grade = "A+";
    }
    else if (avg >= 75) {
        grade = "A";
    }
    else if (avg >= 60) {
        grade = "B";
    }
    else if (avg >= 50) {
        grade = "C";
    }
    else if (avg >= 40) {
        grade = "D";
    }
    else {
        grade = "F";
    }

    if (avg >= 40) {
        result = "Pass";
    }
    else {
        result = "Fail";
    }

    document.getElementById("result").innerHTML =
        "Total Marks: " + total + "<br>" +
        "Average Marks: " + avg.toFixed(2) + "<br>" +
        "Grade: " + grade + "<br>" +
        "Result: " + result;}</script>
</body>
</html>
