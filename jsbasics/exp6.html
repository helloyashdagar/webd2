<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Practice</title>
    <style>
        body {
            text-align: center;
            margin-top: 50px;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1 id="heading">welcome to java script </h1>
    <p id="para">hello, here is output</p>

    <input type="text" id="inputText" placeholder="Enter heading text">

    <br><br>

    <button onclick="changecolor()">Change Background Colour</button>
    <button onclick="changeheading()">Change Heading</button>
    <button onclick="incfont()">Increase Font</button>
    <button onclick="hidepara()">Show/Hide Paragraph</button>






    <script>
        let color = ["red", "", "green", "yellow", "pink", "orange"];
        let index = 0;

        function changecolor() {
            document.body.style.backgroundColor = color[index];
            index = (index + 1) % color.length;
        }

        function changeheading() {
            let input = document.getelementbyid("inputText").value;
            document.getelementbyid("heading").innerText = input;
        }

        function increasefont() {
            let h1 = document.getelementbyid("heading");
            let size = window.getcomputedstyle(h1).fontSize;
            size = parseInt(size);
            h1.style.fontSize = (size + 5) + "px";
        }

        function hidepara() {
            let para = document.getelementbyid("para");
            if (para.style.display === "none") {
                para.style.display = "block";
            } else {
                para.style.display = "none";
            }
        }
    </script>

</body>
</html>
